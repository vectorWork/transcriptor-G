server {
    listen 80;
    server_name _;

    # Permite subir PDFs grandes (coincide con el límite del backend)
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Sirve los módulos ESM (.mjs, p.ej. el worker de pdf.js) con el MIME
    # correcto; por defecto Nginx no mapea .mjs y los entrega como
    # application/octet-stream, lo que rompe la carga del módulo en el navegador.
    # Los .mjs llevan hash en el nombre → cacheo inmutable.
    location ~ \.mjs$ {
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Assets con hash en el nombre (js, css, fuentes…): inmutables.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: el HTML siempre se revalida para tomar los nuevos hashes de assets
    # en cada despliegue (evita servir un index que apunte a assets viejos).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API al servicio backend
    location /api/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
